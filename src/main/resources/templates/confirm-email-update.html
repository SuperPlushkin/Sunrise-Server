<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение смены email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --light-gradient: linear-gradient(135deg, #FFCC00 0%, #FF8C00 80%);
            --medium-gradient: linear-gradient(135deg, #FFE066 0%, #FFB347 80%);
        }
        body {
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirmation-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        .status-header {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--medium-gradient);
        }
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }
        .card-body {
            padding: 40px;
        }
        .form-label {
            font-weight: 600;
            color: #1e293b;
        }
        .btn-submit {
            background: var(--light-gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            color: white;
        }
        .alert {
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div class="confirmation-card" th:if="${!submitted}">
    <div class="status-header">
        <div class="status-icon">
            <i class="bi bi-envelope"></i>
        </div>
    </div>
    <div class="card-body">
        <h3 class="text-center mb-4">Смена email</h3>
        <form th:action="@{/auth/confirm-email-update}" method="post">
            <input type="hidden" name="token" th:value="${token}" />
            <div class="mb-3">
                <label class="form-label">Новый email</label>
                <input type="email" name="email" class="form-control" required placeholder="example@domain.com">
            </div>
            <button type="submit" class="btn-submit">Подтвердить смену</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">Ссылка действительна 24 часа</small>
        </div>
    </div>
</div>

<div class="confirmation-card" th:if="${submitted}">
    <div th:class="${isSuccess} ? 'status-header' : 'status-header'" th:style="${isSuccess} ? 'background: linear-gradient(135deg, #00b09b, #96c93d);' : 'background: linear-gradient(135deg, #ff416c, #ff4b2b);'">
        <div class="status-icon">
            <i th:if="${isSuccess}" class="bi bi-check-circle"></i>
            <i th:unless="${isSuccess}" class="bi bi-exclamation-circle"></i>
        </div>
    </div>
    <div class="card-body">
        <h3 class="text-center" th:text="${isSuccess} ? 'Email изменён' : 'Ошибка'"></h3>
        <div class="alert" th:class="${isSuccess} ? 'alert-success' : 'alert-danger'">
            <span th:text="${message}"></span>
        </div>
        <a th:href="@{/}" class="btn-submit d-block text-center" style="text-decoration: none;">На главную</a>
    </div>
</div>
</body>
</html>
