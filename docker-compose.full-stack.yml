# docker-compose.full-stack.yml
services:
  postgres:
    image: postgres:17
    container_name: sunrise-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-messenger_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-messenger_db}"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart:
      on-failure:2
    networks:
      - sunrise-net

  app:
    build:
      context: .
    container_name: sunrise-app
    environment:
      SPRING_PROFILES_ACTIVE: docker-full-stack

      SERVER_IP: ${SERVER_IP:-localhost}
      SERVER_PORT: ${SERVER_PORT:-10610}

      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_ADDRESS: postgres
      DB_NAME: ${DB_NAME:-messenger_db}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}

      MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME must be set}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD must be set}

      LOGGING_LEVEL_APP: INFO
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN

    ports:
      - "${PORT_SERVER:-10610}:${SERVER_PORT:-10610}"
    depends_on:
      postgres:
        condition: service_healthy
    restart:
      on-failure:2
    networks:
      - sunrise-net

volumes:
  postgres_data:

networks:
  sunrise-net:
    driver: bridge